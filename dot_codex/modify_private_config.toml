#!/bin/sh
set -eu

input=$(cat || true)

printf '%s\n' "$input" | awk '
BEGIN {
  skip_managed_mcp_section = 0
  previous_blank = 0
  in_section = 0
  printed_any = 0
}

/^[[:space:]]*\[[^]]+\][[:space:]]*$/ {
  if ($0 ~ /^[[:space:]]*\[mcp_servers\.(mgrep|context7)\][[:space:]]*$/) {
    skip_managed_mcp_section = 1
    in_section = 1
    next
  }

  skip_managed_mcp_section = 0
  in_section = 1
  print
  previous_blank = 0
  printed_any = 1
  next
}

{
  if ($0 ~ /^[[:space:]]*# chezmoi-managed MCP servers[[:space:]]*$/) {
    next
  }

  if (!in_section && $0 ~ /^[[:space:]]*(model|model_reasoning_effort|tool_output_token_limit|web_search)[[:space:]]*=/) {
    next
  }

  if (!skip_managed_mcp_section) {
    if ($0 ~ /^[[:space:]]*$/) {
      if (printed_any && !previous_blank) {
        print ""
        previous_blank = 1
      }
      next
    }

    print
    previous_blank = 0
    printed_any = 1
  }
}

END {
  if (printed_any && !previous_blank) {
    print ""
  }

  print "# chezmoi-managed MCP servers"
  print "[mcp_servers.mgrep]"
  print "command = \"mgrep\""
  print "args = [\"mcp\"]"
  print ""
  print "[mcp_servers.context7]"
  print "command = \"npx\""
  print "args = [\"-y\", \"@upstash/context7-mcp\"]"
}
'
