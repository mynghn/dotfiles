#!/bin/sh
set -eu

input=$(cat || true)

printf '%s\n' "$input" | awk '
BEGIN {
  skip_managed_mcp_section = 0
  inserted_agent_defaults = 0
  previous_blank = 0
}

function emit(line) {
  if (line ~ /^[[:space:]]*$/) {
    if (!previous_blank) {
      print ""
      previous_blank = 1
    }
    return
  }

  print line
  previous_blank = 0
}

function insert_agent_defaults() {
  if (!inserted_agent_defaults) {
    emit("")
    emit("tool_output_token_limit = 20000")
    emit("web_search = \"cached\"")
    emit("")
    inserted_agent_defaults = 1
  }
}

/^[[:space:]]*\[[^]]+\][[:space:]]*$/ {
  insert_agent_defaults()

  if ($0 ~ /^[[:space:]]*\[mcp_servers\.(mgrep|context7)\][[:space:]]*$/) {
    skip_managed_mcp_section = 1
    next
  }

  skip_managed_mcp_section = 0
  emit($0)
  next
}

{
  if ($0 ~ /^[[:space:]]*# chezmoi-managed MCP servers[[:space:]]*$/) {
    next
  }

  if ($0 ~ /^[[:space:]]*tool_output_token_limit[[:space:]]*=/) {
    next
  }

  if ($0 ~ /^[[:space:]]*web_search[[:space:]]*=/) {
    next
  }

  if (!skip_managed_mcp_section) {
    emit($0)
  }
}

END {
  insert_agent_defaults()

  emit("")
  print "# chezmoi-managed MCP servers"
  print "[mcp_servers.mgrep]"
  print "command = \"mgrep\""
  print "args = [\"mcp\"]"
  print ""
  print "[mcp_servers.context7]"
  print "command = \"npx\""
  print "args = [\"-y\", \"@upstash/context7-mcp\"]"
}
'
